# Default paths relative to the lomi. monorepo root.
openapi = "apps/docs/openapi.json"
agent_openapi = "apps/docs/agent-openapi.json"
docs_content = "apps/docs/content/docs"
sdk_manifest = "apps/sdks/ts/src/generated/sdk-public-methods.json"
mcp_manifest = "apps/mcp/src/generated/tools-manifest.json"
expected_public_operations = "apps/docs/lib/scripts/manual-api/_expected-public-operations.json"
code_roots = [
  "apps/api",
  "apps/cli",
  "apps/mcp",
  "apps/sdks",
]
competitors = "apps/design/docs/competitors"
index_cache = ".doctool/index.json"
graph_cache = ".doctool/graph.json"

[i18n]
source = "en"
targets = ["fr"]
lock_cache = ".doctool/i18n.lock"

[i18n.mdx]
include = ["apps/docs/content/docs/**/*.mdx"]
exclude = ["**/*.fr.mdx", "**/*.es.mdx", "**/*.zh.mdx"]

[llm]
provider = "openai_compatible"
model = "gpt-4.1-mini"
base_url = "https://api.openai.com/v1"
temperature = 0.2
